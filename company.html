<!DOCTYPE HTML>
<html lang="ja">
<head>
	<title>会社概要｜Harmonie-アルモ-株式会社</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
	<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
	<style>
		:root {
			--accent: #c8813a;
			--accent-light: #e8a96a;
			--dark: #1a1a2e;
			--light: #f5f0ea;
			--text: #2a2a2a;
		}
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: 'Zen Kaku Gothic New', sans-serif; background: var(--light); color: var(--text); overflow-x: hidden; }

		/* HEADER */
		#site-header {
			position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
			display: flex; align-items: center; justify-content: space-between;
			padding: 1rem 2.5rem;
			background: rgba(26,26,46,0.95);
			backdrop-filter: blur(8px);
			border-bottom: 1px solid rgba(200,129,58,0.3);
		}
		#site-header .logo img { height: 40px; }
		nav ul { list-style: none; display: flex; gap: 2rem; }
		nav ul li a {
			color: #e8e8e8; text-decoration: none; font-size: 0.85rem;
			letter-spacing: 0.15em; position: relative; padding-bottom: 4px; transition: color 0.3s;
		}
		nav ul li a::after {
			content: ''; position: absolute; bottom: 0; left: 0;
			width: 0; height: 1px; background: var(--accent); transition: width 0.3s;
		}
		nav ul li a:hover { color: var(--accent-light); }
		nav ul li a:hover::after { width: 100%; }
		.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
		.hamburger span { display: block; width: 26px; height: 2px; background: #e8e8e8; }
		@media (max-width: 768px) {
			.hamburger { display: flex; }
			nav { position: fixed; top: 64px; left: 0; right: 0; background: rgba(26,26,46,0.97); padding: 1.5rem; transform: translateY(-200%); transition: transform 0.4s; }
			nav.open { transform: translateY(0); }
			nav ul { flex-direction: column; gap: 1.2rem; }
		}

		/* PAGE HERO */
		.page-hero {
			min-height: 50vh;
			background: var(--dark);
			display: flex; align-items: center; justify-content: center;
			position: relative; overflow: hidden; padding-top: 80px;
		}
		.page-hero-inner { position: relative; z-index: 2; text-align: center; color: white; }
		.page-hero-inner .en {
			font-family: 'Cormorant Garamond', serif;
			font-size: clamp(3rem, 8vw, 6rem);
			font-weight: 300;
			letter-spacing: 0.15em;
			color: rgba(255,255,255,0.15);
			display: block; line-height: 1;
		}
		.page-hero-inner h1 {
			font-size: clamp(1.5rem, 4vw, 2.5rem);
			font-weight: 700; letter-spacing: 0.2em; margin-top: -1.5rem;
		}
		.spiral-bg { position: absolute; inset: 0; pointer-events: none; }
		.spiral-ring { animation: rotateSlow linear infinite; }
		.spiral-ring:nth-child(1) { animation-duration: 40s; }
		.spiral-ring:nth-child(2) { animation-duration: 60s; animation-direction: reverse; }
		@keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

		/* WAVE */
		.wave-divider { display: block; width: 100%; overflow: hidden; line-height: 0; }
		.wave-divider svg { display: block; width: 100%; }

		/* CONTENT */
		.content-section { padding: 6rem 2rem; }
		.content-inner { max-width: 800px; margin: 0 auto; }

		/* TABLE */
		.company-table {
			width: 100%;
			border-collapse: collapse;
			background: white;
			border-radius: 1rem;
			overflow: hidden;
			box-shadow: 0 4px 20px rgba(0,0,0,0.06);
		}
		.company-table tr {
			opacity: 0; transform: translateY(15px);
			transition: opacity 0.5s ease, transform 0.5s ease;
		}
		.company-table tr.visible { opacity: 1; transform: translateY(0); }
		.company-table tr:nth-child(2) { transition-delay: 0.1s; }
		.company-table tr:nth-child(3) { transition-delay: 0.2s; }
		.company-table tr:nth-child(4) { transition-delay: 0.3s; }

		.company-table td {
			padding: 1.5rem 2rem;
			border-bottom: 1px solid rgba(0,0,0,0.06);
			font-size: 0.95rem;
			line-height: 1.7;
		}
		.company-table tr:last-child td { border-bottom: none; }
		.company-table td:first-child {
			width: 160px;
			font-weight: 700;
			color: var(--accent);
			font-size: 0.85rem;
			letter-spacing: 0.1em;
			vertical-align: top;
			padding-top: 1.6rem;
		}
		@media (max-width: 500px) {
			.company-table td { padding: 1rem 1.2rem; }
			.company-table td:first-child { width: 100px; font-size: 0.8rem; }
		}

		/* MAP */
		.map-wrap {
			margin-top: 3rem;
			border-radius: 1rem;
			overflow: hidden;
			box-shadow: 0 4px 20px rgba(0,0,0,0.1);
		}
		.map-wrap iframe { display: block; width: 100%; height: 300px; border: none; }

		/* BACK */
		.back-wrap { text-align: center; padding: 3rem 2rem 5rem; }
		.btn-back {
			display: inline-flex; align-items: center; gap: 0.5rem;
			padding: 0.8rem 2rem;
			border: 1.5px solid var(--accent);
			color: var(--accent); text-decoration: none;
			border-radius: 2rem; font-size: 0.85rem; letter-spacing: 0.1em; transition: all 0.3s;
		}
		.btn-back:hover { background: var(--accent); color: white; }

		/* FOOTER */
		footer { background: #111122; color: rgba(255,255,255,0.4); text-align: center; padding: 2rem; font-size: 0.8rem; }
		footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
		footer a:hover { color: var(--accent-light); }
	</style>
</head>
<body>

	<header id="site-header">
		<div class="logo">
			<a href="index.html"><img src="images/harmonie_logomark_hol.png" alt="Harmonie Co., Ltd."></a>
		</div>
		<button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
		<nav id="main-nav">
			<ul>
				<li><a href="index.html#business">事業紹介</a></li>
				<li><a href="about.html">企業理念</a></li>
				<li><a href="company.html">会社概要</a></li>
				<li><a href="index.html#contact">お問い合わせ</a></li>
			</ul>
		</nav>
	</header>

	<div class="page-hero">
		<svg class="spiral-bg" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
			<g class="spiral-ring" style="transform-origin:400px 200px">
				<ellipse cx="400" cy="200" rx="350" ry="160" fill="none" stroke="rgba(200,129,58,0.07)" stroke-width="1.5"/>
				<ellipse cx="400" cy="200" rx="280" ry="120" fill="none" stroke="rgba(200,129,58,0.05)" stroke-width="1"/>
			</g>
			<g class="spiral-ring" style="transform-origin:400px 200px">
				<ellipse cx="400" cy="200" rx="200" ry="180" fill="none" stroke="rgba(200,129,58,0.06)" stroke-width="1" transform="rotate(30,400,200)"/>
			</g>
		</svg>
		<div class="page-hero-inner">
			<span class="en">Company</span>
			<h1>会社概要</h1>
		</div>
	</div>

	<div class="wave-divider" style="background:var(--dark)">
		<svg viewBox="0 0 1440 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
			<path d="M0,30 C360,60 720,0 1080,30 C1260,45 1380,15 1440,30 L1440,60 L0,60 Z" fill="#f5f0ea"/>
		</svg>
	</div>

	<section class="content-section">
		<div class="content-inner">
			<table class="company-table">
				<tbody>
					<tr>
						<td>社名</td>
						<td>Harmonie-アルモ-株式会社</td>
					</tr>
					<tr>
						<td>代表者</td>
						<td>岡本 大</td>
					</tr>
					<tr>
						<td>設立</td>
						<td>平成22年 8月 3日</td>
					</tr>
					<tr>
						<td>所在地（本社）</td>
						<td>〒812-0013<br>福岡県福岡市博多区博多駅東1-3-3<br>博多ダイチビル402</td>
					</tr>
				</tbody>
			</table>

			<div class="map-wrap">
				<iframe
					src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3323.0!2d130.4197!3d33.5904!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2z5Y2D5bKz5YaF5ZKM5YaF5Z-O!5e0!3m2!1sja!2sjp!4v1"
					allowfullscreen="" loading="lazy">
				</iframe>
			</div>
		</div>
	</section>

	<div class="back-wrap">
		<a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> トップへ戻る</a>
	</div>

	<footer>
		<p><a href="mailto:info@harmo.co.jp"><i class="fa-solid fa-envelope"></i></a></p>
		<p style="margin-top:0.8rem">&copy; Harmonie Co.,Ltd.</p>
	</footer>

	<script>
		const hamburger = document.getElementById('hamburger');
		const nav = document.getElementById('main-nav');
		hamburger.addEventListener('click', () => nav.classList.toggle('open'));
		nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => nav.classList.remove('open')));
		const observer = new IntersectionObserver((entries) => {
			entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
		}, { threshold: 0.1 });
		document.querySelectorAll('.company-table tr').forEach(el => observer.observe(el));
	</script>
</body>
</html>
